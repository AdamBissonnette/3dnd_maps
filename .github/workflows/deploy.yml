name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: ${{ vars.BASE_PATH || '/3dnd_maps/' }}
      - name: Update docs/ for branch deploy
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update GitHub Pages build in docs/ [skip ci]'
          file_pattern: docs/**

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
